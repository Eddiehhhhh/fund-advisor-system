# 分析参数
analysis:
  # 历史数据回测年数
  lookback_years: 5
  
  # 估值分位点阈值
  valuation:
    extremely_low: 5    # 极度低估 (<5%)
    low: 20             # 低估 (<20%)
    normal: 50          # 正常 (<50%)
    high: 80            # 高估 (>80%)
  
  # 技术指标参数
  technical:
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    ma_short: 20
    ma_long: 60
    bollinger_period: 20
    bollinger_std: 2
  
  # 评分权重
  weights:
    valuation: 0.30     # 估值评分权重
    technical: 0.25     # 技术评分权重
    fund_flow: 0.20     # 资金流向权重
    fundamental: 0.15   # 基本面权重
    sentiment: 0.10     # 情绪评分权重

# 推送配置
notification:
  # 邮件配置 (QQ邮箱)
  email:
    enabled: true
    smtp_server: "smtp.qq.com"
    smtp_port: 587
    username: "920104693@qq.com"
    password: "${EMAIL_AUTH_CODE}"
    to_email: "920104693@qq.com"
  
  # 企业微信机器人 (已禁用)
  wecom:
    enabled: false
    webhook_url: ""
  
  # 飞书机器人 (已禁用)
  lark:
    enabled: false
    webhook_url: ""
  
  # 钉钉机器人 (已禁用)
  dingtalk:
    enabled: false
    webhook_url: ""
  
  # Claw/WorkBuddy 微信推送 (已禁用)
  claw:
    enabled: false
    api_url: ""
    token: ""

# 报告配置
report:
  # 推荐买入阈值
  buy_threshold: 75
  # 关注列表阈值
  watch_threshold: 60
  # 生成HTML报告
  generate_html: true
  # 保存历史报告
  save_history: true

# 定时任务配置
schedule:
  # 每日运行时间 (24小时制)
  run_time: "09:00"
  # 时区
  timezone: "Asia/Shanghai"
