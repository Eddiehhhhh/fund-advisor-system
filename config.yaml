    - code: "000688"; name: "科创50"; type: "宽基"
    - code: "000016"; name: "上证50"; type: "宽基"
    - code: "000852"; name: "中证1000"; type: "宽基"
  sector:
    - code: "399997"; name: "中证白酒"; type: "行业-消费"
    - code: "399989"; name: "中证医疗"; type: "行业-医药"
    - code: "399808"; name: "中证新能源"; type: "行业-新能源"
    - code: "H30184"; name: "中证半导体"; type: "行业-科技"
    - code: "399967"; name: "中证军工"; type: "行业-军工"
    - code: "399986"; name: "中证银行"; type: "行业-金融"
    - code: "399975"; name: "证券公司"; type: "行业-金融"
    - code: "931775"; name: "中证房地产"; type: "行业-地产"
    - code: "930050"; name: "中证人工智能"; type: "行业-科技"
    - code: "H30233"; name: "中证传媒"; type: "行业-传媒"
  overseas:
    - code: "NDX"; name: "纳斯达克100"; type: "海外"
    - code: "SPX"; name: "标普500"; type: "海外"
    - code: "HSI"; name: "恒生指数"; type: "海外"

analysis:
  lookback_years: 5
  valuation:
    extremely_low: 5; low: 20; normal: 50; high: 80
  technical:
    rsi_period: 14; rsi_oversold: 30; rsi_overbought: 70
    ma_short: 20; ma_long: 60
    bollinger_period: 20; bollinger_std: 2
  weights:
    valuation: 0.30; technical: 0.25; fund_flow: 0.20
    fundamental: 0.15; sentiment: 0.10

notification:
  # 安全修复：从环境变量读取，不再硬编码邮箱地址
  email:
    enabled: true
    smtp_server: "smtp.qq.com"
    smtp_port: 587
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_AUTH_CODE}"
    to_email: "${EMAIL_TO}"
  wecom:
    enabled: false; webhook_url: ""
  lark:
    enabled: false; webhook_url: ""
  dingtalk:
    enabled: false; webhook_url: ""
  claw:
    enabled: false; api_url: ""; token: ""

report:
  buy_threshold: 75; watch_threshold: 60
  generate_html: true; save_history: true

schedule:
  run_time: "09:00"; timezone: "Asia/Shanghai"
